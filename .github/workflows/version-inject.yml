name: Inject build version
on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  inject-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: ver
        run: |
          TS=$(date -u +"%Y%m%d%H%M%S")
          SHA=$(git rev-parse --short=7 HEAD)
          echo "version=${TS}-${SHA}" >> $GITHUB_OUTPUT

      - name: Replace placeholder or previous version in index.html
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          FILE="index.html"
          # Replace either placeholder or existing pattern like 20260421143000-ab12c3d
          perl -pe "s/(%%BUILD_VERSION%%|[0-9]{14}-[0-9a-f]{7})/${VERSION}/g" -i.bak "$FILE"
          rm -f "${FILE}.bak"


      - name: Commit versioned index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: inject build version ${{ steps.ver.outputs.version }}" || echo "no changes to commit"
          git push

