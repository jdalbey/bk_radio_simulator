<style>
@font-face{
  font-family:'DSEG14Classic';
  src:url('DSEG14Classic-Regular.woff2') format('woff2'),
      url('DSEG14Classic-Regular.woff') format('woff');
  font-weight:normal; font-style:normal;
}

*{ box-sizing:border-box; margin:0; padding:0; }

body{
  background:#8f8e8e;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  font-family:system-ui,sans-serif;
}

/* ── PANEL BODY ── */
.panel{
  width:900px;
  background:linear-gradient(175deg,#363636 0%,#282828 100%);
  border-radius:10px;
  border:2px solid #111;
  box-shadow:
    0 14px 48px rgba(0,0,0,0.85),
    inset 0 1px 0 rgba(255,255,255,0.07),
    inset 0 -1px 0 rgba(0,0,0,0.5);
  display:flex;
  flex-direction:row;
  overflow:hidden;
}

/* ── LEFT CONTROL SECTION ── */
.left-section{
  width:570px;
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  padding:10px 12px 12px 14px;
  gap:7px;
  border-right:3px solid #111;
}

/* ── DISPLAY PANEL ── */
.display-panel{
  background:#090909;
  border:1px solid #3a3a3a;
  border-radius:5px;
  padding:6px 8px 5px;
  display:flex;
  flex-direction:column;
  gap:3px;
  box-shadow:inset 0 2px 8px rgba(0,0,0,0.8);
}

/* Shared row wrapper for LED row and channel text row */
.disp-row{
  display:flex;
  align-items:center;
}

/* 7-column grid used by both LED row and channel text row */
.led-grid{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  justify-items:center;
  flex:1;
  padding:0 22px;
}

.chan-grid{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  flex:1;
  padding:0 24px;
}

/* TX transmit indicator: small circle in left margin of display panel */
.tx-indicator{
  width:9px; height:9px;
  border-radius:50%;
  background:#1a0000;
  border:1px solid #400;
  flex-shrink:0;
  margin-right:4px;
  transition:background 0.15s, box-shadow 0.15s;
  cursor:pointer;
}
.tx-indicator.on{
  background:#ff2200;
  box-shadow:0 0 6px #ff2200, 0 0 12px rgba(255,34,0,0.4);
}
.pr-indicator{
  width:9px; height:9px;
  border-radius:50%;
  background:#1a1000;
  border:1px solid #440;
  flex-shrink:0;
  margin-right:4px;
  transition:background 0.15s, box-shadow 0.15s;
}
.pr-indicator.on{
  background:#ffaa00;
  box-shadow:0 0 6px #ffaa00, 0 0 12px rgba(255,170,0,0.4);
}

/* Spacer matching tx-indicator so chan-grid stays aligned with led-grid */
.tx-spacer{
  width:9px;
  margin-right:4px;
  flex-shrink:0;
}

/* Spacer that mirrors the dimmer-sensor width so chan-grid = led-grid width */
.disp-spacer{
  width:9px;
  flex-shrink:0;
}

/* Individual channel character cell */
.chan-cell{
  font-size:46px;
  font-family:'DSEG14Classic','Courier New',monospace;
  font-weight:normal;
  color:#00d4bc;
  text-shadow:0 0 10px rgba(0,212,188,0.5),0 0 20px rgba(0,212,188,0.15);
  text-align:center;
  line-height:1;
  user-select:none;
}

.led-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:2px;
}

/* Segmented icon: two diagonal hash lines like the illustration */
.seg-icon{
  width:22px; height:14px;
  position:relative;
  overflow:hidden;
}
.seg-icon svg{ display:block; }

.led-name{
  font-size:14px;
  /*color:#555;*/color:#4e6462;
  font-family:monospace;
  letter-spacing:0.5px;
  transition:color 0.15s, text-shadow 0.15s;
}
.led-name.on{
  color:#00ffee;
  text-shadow:0 0 6px #00d4bc, 0 0 14px rgba(0,212,188,0.5);
}
@keyframes scn-flash{
  0%,100%{ color:#00ffee; text-shadow:0 0 6px #00d4bc, 0 0 14px rgba(0,212,188,0.5); }
  50%    { color:#4e6462; text-shadow:none; }
}
.led-name.flashing{
  animation: scn-flash 1s step-start infinite;
}

.led-pip{
  width:0; height:0;
  border-left:8px solid transparent;
  border-right:8px solid transparent;
  border-top:9px solid #222;
  transition:border-top-color 0.1s;
}
.led-pip.on{ border-top-color:#00d4bc; }

.dimmer-sensor{
  width:9px; height:9px;
  border-radius:50%;
  background:#1a1a1a;
  border:1px solid #3a3a3a;
  margin-left:auto;
  flex-shrink:0;
}

/* main channel display */
.main-display{
  display:flex;
  align-items:baseline;
  padding:0 4px;
  gap:0;
}

.ch-label-sm{
  font-size:10px;
  color:#007a6e;
  font-family:monospace;
  letter-spacing:1px;
  margin-right:6px;
  align-self:flex-end;
  padding-bottom:4px;
}

.channel-text{
  font-size:52px;
  font-family:'Courier New',monospace;
  font-weight:bold;
  color:#00d4bc;
  text-shadow:0 0 12px rgba(0,212,188,0.55),0 0 24px rgba(0,212,188,0.2);
  letter-spacing:6px;
  line-height:1;
}

.channel-num{
  font-size:42px;
  font-family:'Courier New',monospace;
  color:#00d4bc;
  text-shadow:0 0 12px rgba(0,212,188,0.55);
  margin-left:auto;
  line-height:1;
}

/* ── PIP ROW (above function buttons) ── */
.pip-row{
  display:flex;
  gap:5px;
}
.pip-cell{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  height:7px;
  padding-top:12px;
}

/* ── FUNCTION BUTTONS ── */
.button-row{
  display:flex;
  gap:5px;
}

.fn-btn{
  flex:1;
  padding:2px 2px;
  background:linear-gradient(180deg,#272727 0%,#1c1c1c 100%);
  color:#aaa;
  border:1px solid #505050;
  border-bottom:2px solid #0d0d0d;
  border-radius:4px;
  cursor:pointer;
  font-size:14px;
  font-family:monospace;
  letter-spacing:1px;
  font-weight:bold;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.06);
  transition:all 0.05s;
  user-select:none;
}
.fn-btn:hover{ color:#ccc; }
.fn-btn:active{ transform:translateY(1px); border-bottom-width:1px; background:#111; }
.fn-btn.active{
  color:yellow; /*#00e5c8;*/
  border-color:ivory; /*#007a6e;*/
  box-shadow:0 0 5px rgba(0,229,200,0.25),inset 0 1px 0 rgba(255,255,255,0.06);
}

/* ── KNOB ROW ── */
.knob-row{
  display:flex;
  align-items:center;
  flex:1;
}

.mic-jack{ flex-shrink:0; }

.knob-group{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:2px;
}

.knob-label{
  font-size:9px;
  color:#777;
  font-family:monospace;
  letter-spacing:1px;
}

svg.knob-svg{ display:block; cursor:grab; }
svg.knob-svg:active{ cursor:grabbing; }

/* vol slider */
input[type=range].vol-slider{
  -webkit-appearance:none;
  appearance:none;
  width:76px;
  height:5px;
  border-radius:3px;
  background:#3a3a3a;
  outline:none;
  cursor:pointer;
  margin-top:3px;
}
input[type=range].vol-slider::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:14px; height:14px;
  border-radius:50%;
  background:#888;
  cursor:pointer;
  border:1px solid #bbb;
}
input[type=range].vol-slider::-moz-range-thumb{
  width:14px; height:14px;
  border-radius:50%;
  background:#888;
  border:1px solid #bbb;
  cursor:pointer;
}

/* ch buttons */
.ch-btns{ display:flex; gap:5px; margin-top:3px; }
.ch-btn{
  padding:3px 8px;
  background:#111827;
  color:white;
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-size:12px;
}
.ch-btn:active{ transform:translateY(1px); }

/* ── RIGHT SPEAKER SECTION ── */
.right-section{
  flex:1;
  display:flex;
  flex-direction:column;
  background:linear-gradient(180deg,#2f2f2f 0%,#252525 100%);
  padding:12px 14px 12px 12px;
  gap:5px;
  position:relative;
}

.grille-slot{
  height:4px;
  background:#141414;
  border-radius:2px;
  box-shadow:0 1px 0 rgba(255,255,255,0.03);
}

.brand-bar{
  position:absolute;
  bottom:14px;
  right:14px;
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:3px;
}

.brand-logo{
  display:flex;
  align-items:center;
  gap:6px;
}

.bk-triangle{
  width:0; height:0;
  border-left:9px solid transparent;
  border-right:0px solid transparent;
  border-bottom:15px solid #777;
}

.bk-text{
  font-size:13px;
  font-weight:bold;
  color:#777;
  letter-spacing:2px;
  font-family:Arial,sans-serif;
}

.bk-sub{
  font-size:8px;
  color:#444;
  letter-spacing:1px;
  font-family:Arial,sans-serif;
}

/* Function button indicators on right side */
.fn-indicators{
  position:absolute;
  top:14px;
  right:14px;
  display:flex;
  flex-direction:column;
  gap:5px;
}

.fn-ind{
  width:9px; height:9px;
  border-radius:2px;
  background:#111;
  border:1px solid #2a2a2a;
  transition:background 0.1s, box-shadow 0.1s;
}
.fn-ind.on{
  background:#00d4bc;
  box-shadow:0 0 4px #00d4bc;
}

/* ── POWERED-OFF state (default) ── */
.panel:not(.powered) .led-name { visibility:hidden; }
.panel:not(.powered) .led-pip  { visibility:hidden; }
.panel:not(.powered) .chan-cell { visibility:hidden; }

/* ── Handset ── */
.handset {
  width: 260px;
  margin: 0;
  padding: 20px 15px 30px;
  background: linear-gradient(#444, #222);
  border-radius: 40px;
  box-shadow: inset 0 2px 6px rgba(255,255,255,0.2),
              0 8px 20px rgba(0,0,0,0.4);
}
.mic_slot {
  width: 60px;
  height: 10px;
  margin: 0 auto 15px;
  background: #111;
  border-radius: 6px;
}
.keypad {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}
button.key {
  height: 32px;
  border-radius: 36px;
  border: none;
  background: #D0D7D9;
  color: black;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 3px #aaa;
}
button.key:active {
  transform: translateY(2px);
  box-shadow: 0 1px #888;
}
button.func {
  font-size: 16px;
}
.ptt_btn .key {
  background: #555;
  color: white;
  box-shadow: 0 3px #222;
  border-radius: 10px;
}
.handset-wrapper {
  display: flex;
  align-items: flex-start;
  width: fit-content;
  margin: 40px auto;
  padding: 20px;
  background: linear-gradient(#3a3a3a, #2a2a2a);
  border: 2px solid #555;
  border-radius: 20px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.4);
}
.ptt_btn {
  margin-top: 45px;
  margin-right: 10px;
}
.ptt_btn .key {
  height: 90px;
  display: flex;
  align-items: center;
  justify-content: center;
}
</style>
</head>

        <text x="23" y="48" font-size="7" fill="#555" text-anchor="middle" font-family="monospace" letter-spacing="1">MIC</text>
      </svg>

      <!-- VOL knob: broken ring + slider (centered under PRI button) -->
      <div class="knob-group" style="margin-left:183px">
        <div class="knob-label">VOL</div>
        <svg class="knob-svg" width="86" height="86" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="fgVol" cx="35%" cy="25%" r="75%">
              <stop offset="0%" stop-color="#5a5a5a"/>
              <stop offset="60%" stop-color="#3a3a3a"/>
              <stop offset="100%" stop-color="#252525"/>

            <radialGradient id="bvVol" cx="30%" cy="20%" r="80%">

          <g id="volInd" transform="translate(100,100) rotate(-135)">

        <div class="knob-label">CH</div>
        <svg class="knob-svg" width="86" height="86" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="fgCh" cx="35%" cy="25%" r="75%">
              <stop offset="0%" stop-color="#5a5a5a"/>
              <stop offset="60%" stop-color="#3a3a3a"/>
              <stop offset="100%" stop-color="#252525"/>
            </radialGradient>
            <radialGradient id="bvCh" cx="30%" cy="20%" r="80%">
              <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
              <stop offset="60%" stop-color="rgba(0,0,0,0.3)"/>
            </radialGradient>
          </defs>
          <circle cx="100" cy="100" r="92" fill="#1a1a1a"/>

        </svg>
        <div class="ch-btns">
          <button class="ch-btn" id="chLeft">◀</button>
          <button class="ch-btn" id="chRight">▶</button>

    </div><!-- /knob-row -->

  </div><!-- /left-section -->

  <!-- ── RIGHT SPEAKER SECTION ── -->
  <div class="right-section" id="rightSection">
    <!-- grille slots injected by JS -->

  const CH_STEPS  = 16, CH_STEP_A  = (MAX_A - MIN_A) / (CH_STEPS  - 1);

  radioAudio.addEventListener('play',  () => { updatePrIndicator(); updateChanDisplay(); });
  radioAudio.addEventListener('pause', () => { updatePrIndicator(); updateChanDisplay(); });
  radioAudio.addEventListener('ended', () => { updatePrIndicator(); updateChanDisplay(); });

  /* Channel name table — 8 chars each, space-padded */
  const CH_NAMES = [
    'SQF CH1 ', 'SQF CH2 ', 'SQF CH3 ', 'SQF CH4 ',
    'SQF CH5 ', 'KNP CMD2', 'ICS RPT2', 'SNF CH2 ',
    'SNF CH4 ', 'FS COM  ', 'R-5 PROJ', 'FS AG 41',
    'FS AG 24', 'NIFC T-2', 'R5 T-4  ', 'R5 T-5  '
  ];

  /* Startup scan list of channels to listen for traffic */
  let scan_list = ['SQF CH3','SQF CH4','R-5 PROJ','FS AG 41'];

  const scnBtn = document.getElementById('btn-SCN');
  const scnLed = document.getElementById('led-SCN');
  const priBtn = document.getElementById('btn-PRI');
  const prLed  = document.getElementById('led-PR');
  let priChannel = BROADCAST_CHANNEL;

  function updateScnLed() {
    if (scnBtn.classList.contains('active') || priBtn.classList.contains('active')) {
      scnLed.classList.remove('on');
      scnLed.classList.add('flashing');
    } else {
      scnLed.classList.remove('flashing');
      scnLed.classList.toggle('on', scan_list.includes(CH_NAMES[chIdx].trim()));
    }
  }

  const prIndicator = document.getElementById('prIndicator');

  function updatePriLed() {
    prLed.classList.toggle('on', priBtn.classList.contains('active'));
  }

  function updatePrIndicator() {
    const lit = priBtn.classList.contains('active') && !radioAudio.paused;
    prIndicator.classList.toggle('on', lit);
  }

  function updateChanDisplay() {
    const showPri = (scnBtn.classList.contains('active') || priBtn.classList.contains('active')) && !radioAudio.paused && !pttMuted;
    const name = CH_NAMES[showPri ? priChannel : chIdx];
    chanCells.forEach((cell, i) => { cell.textContent = name[i] ?? ' '; });
  }

  function setPriorityChannel() {
    if (scnBtn.classList.contains('active') || priBtn.classList.contains('active')) return;
    priChannel = chIdx;
    new Audio('poweron_beep.mp3').play();
    prLed.classList.add('on');
    setTimeout(() => prLed.classList.toggle('on', priBtn.classList.contains('active')), 1500);
  }

  /*
   * makeDraggable — circular/rotary drag for a knob SVG.
   * The user grabs anywhere on the knob and moves the mouse (or finger) in
   * an arc; the angle from the knob's centre to the pointer is tracked and
   * deltas are accumulated.  Every DEG_PER_STEP degrees of arc advances one
   * discrete step.  Works with mouse and touch.
   */
  function makeDraggable(svgEl, getIdx, setIdx, maxIdx, onUpdate){
    const DEG_PER_STEP = 18; // degrees of rotation per one detent step
    let active = false, lastAngle = 0, surplus = 0;

    function ptrAngle(e){
      const r = svgEl.getBoundingClientRect();
      const {clientX, clientY} = e.touches ? e.touches[0] : e;
      return Math.atan2(clientY - (r.top + r.height / 2),
                        clientX - (r.left + r.width  / 2)) * (180 / Math.PI);
    }

    function start(e){
      active = true;
      lastAngle = ptrAngle(e);
      surplus = 0;
      e.preventDefault();
    }

    function move(e){
      if(!active) return;
      let delta = ptrAngle(e) - lastAngle;
      lastAngle = ptrAngle(e);
      if(delta >  180) delta -= 360; // handle ±180° wrap
      if(delta < -180) delta += 360;
      surplus += delta;
      const steps = Math.trunc(surplus / DEG_PER_STEP);
      if(steps){
        surplus -= steps * DEG_PER_STEP;
        setIdx(Math.max(0, Math.min(maxIdx, getIdx() + steps)));
        onUpdate(true);
      }
      e.preventDefault();
    }

    function end(){ active = false; }

    svgEl.addEventListener('mousedown',  start);
    svgEl.addEventListener('touchstart', start, {passive:false});
    window.addEventListener('mousemove',  move);
    window.addEventListener('touchmove',  move, {passive:false});
    window.addEventListener('mouseup',   end);
    window.addEventListener('touchend',  end);
  }

  /* Draw speaker grille slots */
  const rightSec = document.getElementById('rightSection');
  const brandBar = rightSec.querySelector('.brand-bar');
  for(let i=0; i<20; i++){
    const s = document.createElement('div');
    s.className = 'grille-slot';
    rightSec.insertBefore(s, brandBar);
  }

  /* ── VOL knob (broken ring + slider) ── */
  const volInd    = document.getElementById('volInd');
  const volSlider = document.getElementById('volSlider');
  let volIdx = 2;

  function setVolAngle(animate){
    const a = MIN_A + volIdx * VOL_STEP_A;
    volInd.style.transition = animate ? 'transform 180ms cubic-bezier(.22,.9,.32,1)' : 'none';
    volInd.style.transform  = `translate(100px,100px) rotate(${a}deg)`;
    volSlider.value = volIdx;
  }

  volSlider.addEventListener('input', ()=>{ volIdx = +volSlider.value; setVolAngle(true); applyAudioVolume(); });

  /* circular drag + wheel on VOL knob */
  const volSvg = volInd.closest('svg');
  let volDragged = false;
  makeDraggable(volSvg, ()=>volIdx, i=>{ volIdx=i; }, VOL_STEPS-1, (a)=>{ volDragged=true; setVolAngle(a); applyAudioVolume(); });
  volSvg.addEventListener('wheel', e=>{
    e.preventDefault();
    volIdx = e.deltaY < 0 ? Math.min(VOL_STEPS-1, volIdx+1) : Math.max(0, volIdx-1);
    setVolAngle(true);
    applyAudioVolume();
  }, {passive:false});

  volInd.setAttribute('transform', `translate(100,100) rotate(${MIN_A})`);
  volInd.style.transform = '';
  setVolAngle(false);

  /* ── CH knob (yellow dot + buttons) ── */
  const chInd     = document.getElementById('chInd');
  const chanCells = document.querySelectorAll('.chan-cell');
  const chLeft    = document.getElementById('chLeft');
  const chRight   = document.getElementById('chRight');
  let chIdx = 0;

  function setChAngle(animate){
    const a = MIN_A + chIdx * CH_STEP_A;
    chInd.style.transition = animate ? 'transform 180ms cubic-bezier(.22,.9,.32,1)' : 'none';
    chInd.style.transform  = `translate(100px,100px) rotate(${a}deg)`;
    updateChanDisplay();
    updateScnLed();
    const priActive = priBtn.classList.contains('active');
    const scnActive = scnBtn.classList.contains('active');
    const priChName = CH_NAMES[priChannel].trim();
    channelMuted = !priActive && !(scnActive && scan_list.includes(priChName)) && (chIdx !== priChannel);
    applyAudioVolume();  
  }

  chLeft.addEventListener('click',  ()=>{ chIdx = Math.max(0, chIdx - 1);            setChAngle(true); });
  chRight.addEventListener('click', ()=>{ chIdx = Math.min(CH_STEPS - 1, chIdx + 1); setChAngle(true); });

  /* circular drag + wheel on CH knob */
  const chSvg = chInd.closest('svg');
  makeDraggable(chSvg, ()=>chIdx, i=>{ chIdx=i; }, CH_STEPS-1, setChAngle);
  chSvg.addEventListener('wheel', e=>{
    e.preventDefault();
    chIdx = e.deltaY < 0 ? Math.min(CH_STEPS-1, chIdx+1) : Math.max(0, chIdx-1);
    setChAngle(true);
  }, {passive:false});

  chInd.setAttribute('transform', `translate(100,100) rotate(${MIN_A})`);
  chInd.style.transform = '';
  setChAngle(false);

  /* ── Function buttons: toggle active + illuminate corresponding pip ── */
  document.querySelectorAll('.fn-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      btn.classList.toggle('active');
      const pip = document.getElementById('pip-' + btn.id.replace('btn-', ''));
      if(pip) pip.classList.toggle('on', btn.classList.contains('active'));
    });
  });

  scnBtn.addEventListener('click', () => {
    updateScnLed();
    const priActive = priBtn.classList.contains('active');
    const scnActive = scnBtn.classList.contains('active');
    const priChName = CH_NAMES[priChannel].trim();
    channelMuted = !priActive && !(scnActive && scan_list.includes(priChName)) && (chIdx !== priChannel);
    applyAudioVolume();
    updateChanDisplay();
  });

  let priLongPressed = false;
  let priPressTimer  = null;
  function priDown() {
    priPressTimer = setTimeout(() => { priPressTimer = null; priLongPressed = true; setPriorityChannel(); }, 1000);
  }
  function priUp() { if (priPressTimer) { clearTimeout(priPressTimer); priPressTimer = null; } }
  priBtn.addEventListener('mousedown',  priDown);
  priBtn.addEventListener('mouseup',    priUp);
  priBtn.addEventListener('mouseleave', priUp);
  priBtn.addEventListener('touchstart', priDown, {passive:true});
  priBtn.addEventListener('touchend',   priUp);
  priBtn.addEventListener('touchcancel',priUp);
  priBtn.addEventListener('click', () => {
    if (priLongPressed) {
      priLongPressed = false;
      priBtn.classList.toggle('active');          // undo generic toggle
      document.getElementById('pip-PRI').classList.toggle('on', priBtn.classList.contains('active'));
      return;
    }
    updateScnLed();
    updatePriLed();
    updatePrIndicator();
    const priActive = priBtn.classList.contains('active');
    const scnActive = scnBtn.classList.contains('active');
    const priChName = CH_NAMES[priChannel].trim();
    channelMuted = !priActive && !(scnActive && scan_list.includes(priChName)) && (chIdx !== priChannel);
    applyAudioVolume();
    updateChanDisplay();
  });

  /* ── TX transmit indicator — driven by handset PTT hold ── */
  const txIndicator = document.getElementById('txIndicator');
  const pttBtn = document.querySelector('.ptt_btn .key');
  const txLed = document.getElementById('led-TX');
  function pttPress(e) { e.preventDefault(); emitKey('PTT'); if (thePanel.classList.contains('powered')) { txIndicator.classList.add('on'); txLed.classList.add('on'); } pttMuted = true; applyAudioVolume(); updateChanDisplay(); }
  function pttRelease(e) { e.preventDefault(); txIndicator.classList.remove('on'); txLed.classList.remove('on'); pttMuted = false; applyAudioVolume(); updateChanDisplay(); }
  pttBtn.addEventListener('mousedown',  pttPress);
  pttBtn.addEventListener('mouseup',    pttRelease);
  pttBtn.addEventListener('mouseleave', pttRelease);
  pttBtn.addEventListener('touchstart', pttPress,   {passive:false});
  pttBtn.addEventListener('touchend',   pttRelease, {passive:false});
  pttBtn.addEventListener('touchcancel',pttRelease, {passive:false});

  /* ── Handset keypad ── */
  const handset = document.getElementById('handset');
  function emitKey(key) {
    handset.dispatchEvent(new CustomEvent('radio-key', { detail: { key } }));
    console.log('Key pressed:', key);
  }
  document.querySelectorAll('.keypad .key').forEach(btn => {
    btn.addEventListener('click', () => emitKey(btn.textContent.trim()));
  });
  document.addEventListener('keydown', (e) => {
    let key = null;
    if (e.key >= '0' && e.key <= '9') key = e.key;
    else if (e.key === '*') key = '*';
    else if (e.key === '#') key = '#';
    if (key) {
      emitKey(key);
      const btn = [...document.querySelectorAll('.keypad .key')]
        .find(b => b.textContent.trim() === key);
      if (btn) {
        btn.classList.add('active');
        setTimeout(() => btn.classList.remove('active'), 100);
      }
    }
  });
  handset.addEventListener('radio-key', e => {
    if (e.detail.key.trim() === 'PRI') { setPriorityChannel(); return; }
    if (scnBtn.classList.contains('active')) return;
    const ch = CH_NAMES[chIdx].trim();
    if (e.detail.key === 'ENT') {
      if (!scan_list.includes(ch)) scan_list.push(ch);
      updateScnLed();
    } else if (e.detail.key === 'CLR') {
      scan_list = scan_list.filter(c => c !== ch);
      updateScnLed();
    }
  });

  /* ── Power on/off via VOL knob click ── */
  const thePanel = document.getElementById('thePanel');
  let powered = false;

  function powerOn(){
    powered = true;
    thePanel.classList.add('powered');
    chIdx = 3; // SQF CH4
    setChAngle(false);
    ['SCN','PRI'].forEach(name=>{
      document.getElementById('btn-'+name).classList.add('active');
      document.getElementById('pip-'+name).classList.add('on');
    });
    updateScnLed();
    updatePriLed();
    const beep = new Audio('poweron_beep.mp3');
    beep.play();
    beep.onended = () => {
      radioAudio.currentTime = 0;
      radioAudio.play();
      applyAudioVolume();
    };
  }

  function powerOff(){
    powered = false;
    thePanel.classList.remove('powered');
    document.querySelectorAll('.fn-btn').forEach(btn=>{
      btn.classList.remove('active');
      const pip = document.getElementById('pip-'+btn.id.replace('btn-',''));
      if(pip) pip.classList.remove('on');
    });
    chanCells.forEach(cell=>{ cell.textContent='\u00a0'; });
    scnLed.classList.remove('on', 'flashing');
    prLed.classList.remove('on');
    prIndicator.classList.remove('on'); 
    radioAudio.pause();                                                       
    radioAudio.currentTime = 0;   
  }

  volSvg.addEventListener('click', ()=>{ if(volDragged){ volDragged=false; return; } powered ? powerOff() : powerOn(); });
  volSvg.addEventListener('touchend', e=>{ e.preventDefault(); if(volDragged){ volDragged=false; return; } powered ? powerOff() : powerOn(); });
})();
</script>
</body>
</html>
